services:
  db:
    image: postgres:16-alpine
    container_name: aether-db
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      POSTGRES_DB: aether_dev
    ports:
      - "5433:5432"
    volumes:
      - aether_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_dev"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  aether_pgdata:
